name: Secret Scan

on:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for real secrets
        shell: bash
        run: |
          echo "Scanning for secrets..."

          # echte Passw—rter (nicht CHANGE_ME)
          if grep -r -E "Password=(?!CHANGE_ME)" .; then
            echo "? Real password detected"
            exit 1
          fi

          # typische API Key Muster (lang + random)
          if grep -r -E "[A-Za-z0-9]{20,}" . | grep -i "key\|token"; then
            echo "? Potential API key detected"
            exit 1
          fi

          echo "? No real secrets found"
