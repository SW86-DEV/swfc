name: Structure Check

on:
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        shell: bash
        run: |
          set -e

          echo "Checking root structure..."

          allowed_dirs=(".github" "build" "docs" "src" "tests")
          allowed_files=(".editorconfig" ".gitignore" "README.md" "SWFC.slnx")

          for item in * .*; do
            [ "$item" = "." ] || [ "$item" = ".." ] && continue

            if [ -d "$item" ]; then
              if [[ ! " ${allowed_dirs[@]} " =~ " $item " ]]; then
                echo "? Invalid root directory: $item"
                exit 1
              fi
            elif [ -f "$item" ]; then
              if [[ ! " ${allowed_files[@]} " =~ " $item " ]]; then
                echo "? Invalid root file: $item"
                exit 1
              fi
            fi
          done

          echo "Checking /src..."
          if [ -d src ]; then
            for dir in src/*; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")
              if [[ ! "$name" =~ ^SWFC\..+ ]]; then
                echo "? Invalid directory under src: $name"
                exit 1
              fi
            done
          fi

          echo "Checking /tests..."
          if [ -d tests ]; then
            for dir in tests/*; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")
              if [[ ! "$name" =~ Test|Tests ]]; then
                echo "? Invalid directory under tests: $name"
                exit 1
              fi
            done
          fi

          echo "? Structure check passed."
