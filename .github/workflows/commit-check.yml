name: Commit Message Guard

on:
  pull_request:

jobs:
  commit-message-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Validate commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            for (const commit of commits.data) {
              const message = commit.commit.message;

              core.info(`Checking: ${message}`);

              const validStandard = /^(feat|fix|chore)\(M[0-9]{3}\.[0-9]{2}\):/.test(message);
              const validMerge = message.startsWith("Merge");

              if (!validStandard && !validMerge) {
                core.setFailed(`Invalid commit message: ${message}`);
              }
            }