name: Commit Message Check

on:
  pull_request:

jobs:
  commit-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const commits = await github.rest.pulls.listCommits({
  owner: context.repo.owner,
  repo: context.repo.repo,
  pull_number: context.payload.pull_request.number
});

for (const commit of commits.data) {
  const message = commit.commit.message;

  core.info(`Checking: ${message}`);

  // Regel 1: erlaubte Standard-Commits
  const validStandard = /^(feat|fix|chore)\(M[0-9]{3}\.[0-9]{2}\):/.test(message);

  // Regel 2: erlaubte Merge-Commits
  const validMerge = message.startsWith("Merge");

  if (!validStandard && !validMerge) {
    core.setFailed(`Invalid commit message: ${message}`);
  }
}