name: Dependency Check

on:
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        shell: bash
        run: |
          set -e
          dotnet list package --vulnerable --include-transitive > vulnerable.txt || true

          cat vulnerable.txt

          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "? Vulnerable packages detected"
            exit 1
          fi

          echo "? No vulnerable packages detected"
