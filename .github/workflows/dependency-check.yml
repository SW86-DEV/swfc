name: Dependency Check

on:
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        shell: bash
        run: |
          set -e

          echo "Checking for vulnerable packages..."

          dotnet list package --vulnerable --include-transitive > vulnerable.txt || true

          echo "==== Vulnerability Report ===="
          cat vulnerable.txt
          echo "=============================="

          if grep -q "Top-level Package" vulnerable.txt || grep -q "Transitive Package" vulnerable.txt; then
            echo "❌ Vulnerable packages detected!"
            exit 1
          fi

          echo "✅ No vulnerable packages detected"